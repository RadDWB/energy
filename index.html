<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>🔥 Power-Helden – Dein Körper als Superheld! ⚡</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Fredoka:wght@400;700&family=Comic+Neue:wght@700&display=swap');
    
    body {
      margin: 0;
      font-family: 'Fredoka', sans-serif;
      background: linear-gradient(135deg, #a8e6cf, #d0f4de, #ffeb9e);
      overflow: hidden;
      color: #333;
    }
    .header {
      background: linear-gradient(#ff6b6b, #ff9f1c);
      color: white;
      text-align: center;
      padding: 20px;
      font-size: 2.8rem;
      text-shadow: 3px 3px 0 #000;
      box-shadow: 0 10px 20px rgba(0,0,0,0.3);
    }
    canvas {
      display: block;
      margin: 20px auto;
      border-radius: 30px;
      box-shadow: 0 15px 35px rgba(0,0,0,0.2);
      background: #fff;
    }
    .controls {
      text-align: center;
      padding: 25px;
      display: flex;
      justify-content: center;
      gap: 15px;
      flex-wrap: wrap;
    }
    button {
      font-family: 'Comic Neue', cursive;
      font-size: 1.4rem;
      padding: 18px 30px;
      border: none;
      border-radius: 50px;
      cursor: pointer;
      box-shadow: 0 8px 0 #333;
      transition: all 0.1s;
    }
    button:active { transform: translateY(4px); box-shadow: 0 4px 0 #333; }
    .btn-sprint { background: #ffe600; color: #333; }
    .btn-mittel { background: #ff4d4d; color: white; }
    .btn-ausdauer { background: #4ecdc4; color: white; }
    .info {
      text-align: center;
      font-size: 1.6rem;
      min-height: 80px;
      padding: 15px;
      background: rgba(255,255,255,0.9);
      margin: 0 20px 20px;
      border-radius: 20px;
      box-shadow: 0 5px 15px rgba(0,0,0,0.1);
    }
  </style>
</head>
<body>
  <div class="header">✨ DEINE POWER-HELDEN ✨</div>
  <canvas id="canvas" width="1000" height="580"></canvas>
  
  <div class="controls">
    <button class="btn-sprint" onclick="start(0)">🚀 Kurzer Turbo-Sprint!</button>
    <button class="btn-mittel" onclick="start(1)">🏃‍♂️ Mittleres Rennen</button>
    <button class="btn-ausdauer" onclick="start(2)">🌳 Langer Abenteuer-Lauf</button>
    <button onclick="reset()">🔄 Nochmal von vorne</button>
  </div>
  
  <div class="info" id="info">Klick auf einen Button und schau, wie deine Helden arbeiten! 🦸‍♂️</div>

  <script>
    const canvas = document.getElementById('canvas');
    const ctx = canvas.getContext('2d');
    let time = 0, running = false, mode = 0;

    function drawSky() {
      ctx.fillStyle = '#87CEEB';
      ctx.fillRect(0, 0, canvas.width, 320);
      // Sonne
      ctx.fillStyle = '#ffeb3b';
      ctx.beginPath(); ctx.arc(800, 120, 60, 0, Math.PI*2); ctx.fill();
      // Wolken
      ctx.fillStyle = 'white';
      for(let i=0; i<5; i++) {
        ctx.beginPath(); ctx.ellipse(150+i*180, 80+i*20, 60, 30, 0, 0, Math.PI*2); ctx.fill();
      }
    }

    function drawGround() {
      ctx.fillStyle = '#98fb98';
      ctx.fillRect(0, 320, canvas.width, 260);
      // Gras
      ctx.fillStyle = '#228b22';
      for(let x=0; x<canvas.width; x+=30) {
        ctx.fillRect(x, 320, 15, 40);
      }
    }

    function drawRunner() {
      let x = 250 + Math.sin(time/4)*25;
      let y = 280;
      
      // Beine (wippen)
      ctx.strokeStyle = '#2c3e50';
      ctx.lineWidth = 18;
      ctx.beginPath();
      ctx.moveTo(x-18, y+70);
      ctx.lineTo(x-35 + Math.sin(time*2)*12, y+130);
      ctx.moveTo(x+18, y+70);
      ctx.lineTo(x+35 - Math.sin(time*2)*12, y+130);
      ctx.stroke();
      
      // Körper
      ctx.fillStyle = '#e74c3c';
      ctx.fillRect(x-30, y-10, 60, 90);
      
      // Kopf
      ctx.fillStyle = '#ffdbac';
      ctx.beginPath(); ctx.arc(x, y-35, 28, 0, Math.PI*2); ctx.fill();
      // Augen
      ctx.fillStyle = '#333';
      ctx.beginPath(); ctx.arc(x-10, y-40, 6, 0, Math.PI*2); ctx.fill();
      ctx.beginPath(); ctx.arc(x+10, y-40, 6, 0, Math.PI*2); ctx.fill();
      
      // Arme
      ctx.strokeStyle = '#e74c3c';
      ctx.lineWidth = 14;
      ctx.beginPath();
      ctx.moveTo(x-25, y+20);
      ctx.lineTo(x-55 + Math.cos(time*1.5)*15, y+50);
      ctx.moveTo(x+25, y+20);
      ctx.lineTo(x+55 - Math.cos(time*1.5)*15, y+50);
      ctx.stroke();
    }

    function drawHeroes() {
      const bolt = Math.max(0, 100 - time*12);
      const saure = Math.max(0, 95 - time*5);
      const aero = Math.max(0, time*2.5 - 25);
      
      const positions = [150, 380, 610];
      const colors = ['#ffe600', '#ff4757', '#1abc9c'];
      const names = ['⚡ Blitz-Bolt', '🔥 Power-Sprinter', '🌬️ Dauer-Atem'];
      const percs = [bolt, saure, aero];
      
      for(let i=0; i<3; i++) {
        let height = percs[i] * 2.2;
        ctx.fillStyle = colors[i];
        ctx.fillRect(positions[i], 480 - height, 70, height);
        
        ctx.font = 'bold 28px Fredoka';
        ctx.fillStyle = '#333';
        ctx.fillText(names[i], positions[i]+5, 530);
        ctx.font = 'bold 22px Arial';
        ctx.fillText(Math.round(percs[i]) + '%', positions[i]+18, 560);
      }
    }

    function draw() {
      ctx.clearRect(0, 0, canvas.width, canvas.height);
      drawSky();
      drawGround();
      drawRunner();
      drawHeroes();
      
      let message = "Los geht’s!";
      if(time > 5) message = "🚀 Blitz-Bolt gibt alles!";
      if(time > 25) message = "🔥 Jetzt hilft Power-Sprinter mit!";
      if(time > 70) message = "🌬️ Dauer-Atem übernimmt – du kannst stundenlang laufen! 🥳";
      
      document.getElementById('info').textContent = message;
    }

    function animate() {
      if(!running) return;
      time += 0.9;
      draw();
      if(time < 180) requestAnimationFrame(animate);
      else {
        running = false;
        document.getElementById('info').innerHTML = "🎉 Mega! Du bist ein echter Ausdauer-Held! 🏆";
      }
    }

    function start(m) {
      mode = m;
      time = 0;
      running = true;
      animate();
    }

    function reset() {
      running = false;
      time = 0;
      draw();
      document.getElementById('info').textContent = "Wähle dein Abenteuer!";
    }

    // Startbild
    draw();
  </script>
</body>
</html>
